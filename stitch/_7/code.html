<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>

<title>记录身体数据 - 温暖守护</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff9e42",
                        "background-light": "#f8f7f5",
                        "background-dark": "#23190f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .cat-ear-left {
            position: absolute;
            top: -12px;
            left: 24px;
            width: 32px;
            height: 24px;
            background-color: white;
            border-radius: 50% 50% 0 0;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .cat-ear-right {
            position: absolute;
            top: -12px;
            right: 24px;
            width: 32px;
            height: 24px;
            background-color: white;
            border-radius: 50% 50% 0 0;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-slate-200 dark:bg-slate-900 font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
<!-- Modal Container -->
<div class="relative w-full max-w-md bg-background-light dark:bg-background-dark rounded-xl shadow-2xl overflow-visible">
<!-- Decorative Cat Ears -->
<div class="cat-ear-left dark:bg-background-dark"></div>
<div class="cat-ear-right dark:bg-background-dark"></div>
<!-- Header -->
<div class="p-6 pb-2 text-center relative">
<div class="absolute top-4 right-4 text-slate-400">
<span class="material-symbols-outlined cursor-pointer">close</span>
</div>
<h2 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-primary">pets</span>
                    记录身体数据
                </h2>
</div>
<!-- Content -->
<div class="p-6 pt-2 space-y-6">
<!-- Type Selection -->
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary/10 text-primary transition-all">
<span class="material-symbols-outlined mb-1">vaccines</span>
<span class="text-xs font-bold">血糖</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-transparent bg-white dark:bg-white/5 text-slate-500 dark:text-slate-400 hover:bg-slate-50 transition-all">
<span class="material-symbols-outlined mb-1">monitor_heart</span>
<span class="text-xs font-bold">血压</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-transparent bg-white dark:bg-white/5 text-slate-500 dark:text-slate-400 hover:bg-slate-50 transition-all">
<span class="material-symbols-outlined mb-1">scale</span>
<span class="text-xs font-bold">体重</span>
</button>
</div>
<!-- Time Picker Row -->
<div class="flex items-center justify-between px-4 py-3 bg-white dark:bg-white/5 rounded-xl border border-slate-100 dark:border-slate-800">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400">schedule</span>
<span class="text-sm text-slate-600 dark:text-slate-300">记录时间</span>
</div>
<div class="flex items-center gap-1 text-sm font-medium text-slate-900 dark:text-slate-100">
                        今天 14:30
                        <span class="material-symbols-outlined text-sm">chevron_right</span>
</div>
</div>
<!-- Main Input Area -->
<div class="space-y-4">
<div class="relative flex flex-col items-center py-4 bg-white dark:bg-white/5 rounded-xl border border-slate-100 dark:border-slate-800">
<div class="flex items-baseline gap-2">
<input class="w-32 text-center text-4xl font-bold bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 placeholder:text-slate-200" placeholder="0.0" step="0.1" type="number"/>
<span class="text-slate-400 font-medium">mmol/L</span>
</div>
<!-- Status Indicator -->
<div class="mt-4 flex items-center gap-1.5 px-3 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full text-xs font-bold">
<span class="w-2 h-2 rounded-full bg-green-500"></span>
                            数值正常
                        </div>
</div>

                    </div>

<!-- Action Button -->
<button class="w-full py-4 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/30 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    保存记录
                </button>
</div>
<!-- Footer Decoration -->
<div class="pb-4 flex justify-center">
<div class="flex gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/20"></div>
</div>
</div>
