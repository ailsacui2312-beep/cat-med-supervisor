<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff9e42",
                        "background-light": "#f8f7f5",
                        "background-dark": "#23190f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>统计记录 - 小猫吃药监督</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto bg-white dark:bg-slate-900 min-h-screen flex flex-col shadow-xl">
<!-- Header -->
<header class="sticky top-0 z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-4 py-4 border-b border-primary/10">
<div class="flex items-center justify-between">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">arrow_back</span>
</button>
<h1 class="text-xl font-bold text-slate-900 dark:text-slate-100">统计记录</h1>
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">share</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto pb-24">
<!-- Overall Score Card -->
<section class="p-4">
<div class="bg-primary/10 dark:bg-primary/5 rounded-xl p-6 border border-primary/20">
<div class="flex items-center justify-between mb-4">
<div>
<p class="text-sm font-medium text-primary/80 uppercase tracking-wider">本周服药依从性</p>
<h2 class="text-4xl font-bold text-slate-900 dark:text-slate-50 mt-1">95%</h2>
</div>
<div class="h-16 w-16 bg-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-3xl">pets</span>
</div>
</div>
<div class="flex items-center gap-2">
<span class="flex items-center text-emerald-600 dark:text-emerald-400 text-sm font-bold bg-emerald-100 dark:bg-emerald-900/30 px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-sm mr-1">trending_up</span>+2%
                        </span>
<p class="text-sm text-slate-500 dark:text-slate-400">对比上周同期</p>
</div>
</div>
</section>
<!-- Chart Section -->
<section class="px-4 py-2">
<div class="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-100 dark:border-slate-700 shadow-sm">
<div class="flex items-center justify-between mb-6">
<h3 class="font-bold text-lg">过去7天记录</h3>
<span class="text-xs text-slate-400">单位：%</span>
</div>
<div class="flex items-end justify-between h-48 px-2">
<!-- Monday -->
<div class="flex flex-col items-center gap-2 w-full">
<div class="relative w-8 bg-primary/20 dark:bg-primary/10 rounded-t-lg overflow-hidden h-[80%]">
<div class="absolute bottom-0 w-full bg-primary h-full"></div>
</div>
<span class="text-xs font-medium text-slate-500">周一</span>
</div>
<!-- Tuesday -->
<div class="flex flex-col items-center gap-2 w-full">
<div class="relative w-8 bg-primary/20 dark:bg-primary/10 rounded-t-lg overflow-hidden h-[80%]">
<div class="absolute bottom-0 w-full bg-primary h-[60%]"></div>
</div>
<span class="text-xs font-medium text-slate-500">周二</span>
</div>
<!-- Wednesday -->
<div class="flex flex-col items-center gap-2 w-full">
<div class="relative w-8 bg-primary/20 dark:bg-primary/10 rounded-t-lg overflow-hidden h-[80%]">
<div class="absolute bottom-0 w-full bg-primary h-[90%]"></div>
</div>
<span class="text-xs font-medium text-slate-500">周三</span>
</div>
<!-- Thursday -->
<div class="flex flex-col items-center gap-2 w-full">
<div class="relative w-8 bg-primary/20 dark:bg-primary/10 rounded-t-lg overflow-hidden h-[80%]">
<div class="absolute bottom-0 w-full bg-primary h-[100%]"></div>
</div>
<span class="text-xs font-medium text-slate-500">周四</span>
</div>
<!-- Friday -->
<div class="flex flex-col items-center gap-2 w-full">
<div class="relative w-8 bg-primary/20 dark:bg-primary/10 rounded-t-lg overflow-hidden h-[80%]">
<div class="absolute bottom-0 w-full bg-primary h-[75%]"></div>
</div>
<span class="text-xs font-medium text-slate-500">周五</span>
</div>
<!-- Saturday -->
<div class="flex flex-col items-center gap-2 w-full">
<div class="relative w-8 bg-primary/20 dark:bg-primary/10 rounded-t-lg overflow-hidden h-[80%]">
<div class="absolute bottom-0 w-full bg-primary h-[85%]"></div>
</div>
<span class="text-xs font-medium text-slate-500">周六</span>
</div>
<!-- Sunday -->
<div class="flex flex-col items-center gap-2 w-full">
<div class="relative w-8 bg-primary/20 dark:bg-primary/10 rounded-t-lg overflow-hidden h-[80%]">
<div class="absolute bottom-0 w-full bg-primary h-[95%]"></div>
</div>
<span class="text-xs font-medium text-slate-500 text-primary">今天</span>
</div>
</div>
</div>
</section>
<!-- Key Metrics Grid -->
<section class="grid grid-cols-2 gap-4 px-4 py-4">
<div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-700">
<p class="text-xs text-slate-500 dark:text-slate-400 mb-1">按时服药率</p>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">88%</p>
</div>
<div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-100 dark:border-slate-700">
<p class="text-xs text-slate-500 dark:text-slate-400 mb-1">连续服药</p>
<p class="text-xl font-bold text-slate-900 dark:text-slate-100">156 天</p>
</div>
</section>
<!-- History List -->
<section class="px-4 py-4">
<div class="flex items-center justify-between mb-4">
<h3 class="font-bold text-lg">历史详情</h3>
<button class="text-primary text-sm font-medium">查看更多</button>
</div>
<div class="space-y-3">
<!-- History Item 1 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400">check_circle</span>
</div>
<div>
<p class="font-semibold">3月15日</p>
<p class="text-xs text-slate-500">周五</p>
</div>
</div>
<div class="text-right">
<p class="font-bold text-emerald-600 dark:text-emerald-400">5/5</p>
<p class="text-[10px] text-slate-400 uppercase">全部完成</p>
</div>
</div>
<!-- History Item 2 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 dark:bg-primary/5 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary">pending</span>
</div>
<div>
<p class="font-semibold">3月14日</p>
<p class="text-xs text-slate-500">周四</p>
</div>
</div>
<div class="text-right">
<p class="font-bold text-primary">4/5</p>
<p class="text-[10px] text-slate-400 uppercase">漏服 1 次</p>
</div>
</div>
<!-- History Item 3 -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-700">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400">check_circle</span>
</div>
<div>
<p class="font-semibold">3月13日</p>
<p class="text-xs text-slate-500">周三</p>
</div>
</div>
<div class="text-right">
<p class="font-bold text-emerald-600 dark:text-emerald-400">5/5</p>
<p class="text-[10px] text-slate-400 uppercase">全部完成</p>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 px-6 py-3">
<div class="flex items-center justify-between max-w-xs mx-auto">
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">pill</span>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary">今天</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">inventory_2</span>
<span class="text-[10px] font-medium text-slate-400 group-hover:text-primary">药柜</span>
</a>
<a class="flex flex-col items-center gap-1" href="#">
<div class="relative">
<span class="material-symbols-outlined text-primary fill-[1]">bar_chart</span>
<div class="absolute -top-1 -right-1 w-2 h-2 bg-primary rounded-full"></div>
</div>
<span class="text-[10px] font-bold text-primary">记录</span>
</a>
</div>
</nav>
</div>
</body></html>
